<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tally Prime &amp; Accountancy Master | স্মার্ট স্টাডি ও পারুলিয়া যুব কম্পিউটার কেন্দ্র</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3F5F9; --navy:#142850; --navy2:#1F3A66; --ink:#16213A; --ink-soft:#566077;
    --gold:#D9A441; --correct-green:#1A7A56; --wrong-red:#B33A3A; --tick-grey:#D6DAE3;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; background:#D8DCE6; font-family:'Noto Sans Bengali','Noto Sans Devanagari',sans-serif; color:var(--ink);
    display:flex; align-items:center; justify-content:center; padding:24px 12px;}
  .sheet{width:100%; max-width:740px; background:var(--paper); border-radius:10px; box-shadow:0 18px 50px rgba(20,40,80,0.25);
    overflow:hidden; min-height:600px; display:flex; flex-direction:column;}
  header.topbar{background:var(--navy); color:#fff; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  .brandmark{font-family:'Space Mono', monospace; font-size:0.7rem; letter-spacing:0.03em; opacity:0.85;}
  .top-actions{display:flex; align-items:center; gap:10px;}
  .lang-switch{display:flex; gap:4px; background:rgba(255,255,255,0.1); border-radius:14px; padding:3px;}
  .lang-btn{background:none; border:none; color:rgba(255,255,255,0.75); font-size:0.74rem; padding:5px 10px; border-radius:10px; cursor:pointer; font-family:'Noto Sans Bengali','Noto Sans Devanagari',sans-serif;}
  .lang-btn.active{background:var(--gold); color:#142850; font-weight:700;}
  .icon-btn{background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); color:#fff; font-size:0.85rem; padding:6px 11px; border-radius:18px; cursor:pointer; display:none;}
  .icon-btn.show{display:inline-block;}
  main{flex:1; padding:22px 24px; display:flex; flex-direction:column;}
  .screen{display:none;} .screen.active{display:flex; flex-direction:column; flex:1; animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .hero-eyebrow{font-family:'Space Mono', monospace; font-size:0.7rem; color:var(--correct-green); letter-spacing:0.06em; margin-bottom:6px;}
  h1.hero-title{font-family:'Noto Serif Bengali','Noto Sans Devanagari',serif; font-size:1.5rem; margin:0 0 8px 0; color:var(--ink); line-height:1.4;}
  p.hero-sub{font-size:0.9rem; color:var(--ink-soft); margin:0 0 20px 0; line-height:1.65;}
  .option-label{font-size:0.8rem; color:var(--ink-soft); margin-bottom:8px; font-weight:600;}
  .chip-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
  .chip{border:1.5px solid rgba(22,33,58,0.2); background:#fff; color:var(--ink); font-size:0.84rem; padding:9px 15px; border-radius:18px; cursor:pointer; font-family:inherit;}
  .chip.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .start-btn{margin-top:auto; background:var(--navy); color:#fff; border:none; border-radius:24px; padding:13px 0; font-size:0.96rem; font-weight:700; cursor:pointer; font-family:inherit;}
  .start-btn:hover{background:#0e1d3c;}

  .ruler-wrap{margin-bottom:16px;}
  .ruler-meta{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .ruler-meta .count{font-family:'Space Mono', monospace; font-size:0.88rem; color:var(--ink);}
  .ruler-meta .score{font-family:'Space Mono', monospace; font-size:0.8rem; color:var(--correct-green);}
  .ruler-track{position:relative; height:28px; display:flex; align-items:flex-end; border-bottom:2px solid var(--navy);}
  .ruler-ticks{display:flex; width:100%; justify-content:space-between; align-items:flex-end; height:100%;}
  .tick{width:2px; background:var(--tick-grey); height:7px;} .tick.medium{height:12px;} .tick.major{height:18px;}
  .tick.correct{background:var(--correct-green);} .tick.incorrect{background:var(--wrong-red);}
  .ruler-cursor{position:absolute; bottom:-1px; width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-bottom:8px solid var(--gold); transform:translateX(-6px); transition:left 0.35s ease;}

  .q-tag{display:inline-block; font-family:'Space Mono', monospace; font-size:0.64rem; padding:3px 9px; border-radius:10px; margin-bottom:10px; letter-spacing:0.04em;}
  .q-tag.tx{background:rgba(217,164,65,0.18); color:#8a6418;}
  .q-tag.th{background:rgba(26,122,86,0.12); color:var(--correct-green);}
  .question-text{font-family:'Noto Serif Bengali','Noto Sans Devanagari',serif; font-size:1.08rem; line-height:1.6; color:var(--ink); margin:0 0 16px 0;}

  .fkey-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
  .fkey-btn{background:var(--navy2); color:#fff; border:2px solid transparent; border-radius:6px; padding:8px 10px; font-size:0.72rem; text-align:center; cursor:pointer; flex:1; min-width:78px; font-family:inherit;}
  .fkey-btn .k{display:block; font-family:'Space Mono', monospace; font-size:0.68rem; opacity:0.85;}
  .fkey-btn.active{border-color:var(--gold); background:#0e1d3c;}
  .fkey-btn.lock-correct{border-color:var(--correct-green); background:rgba(26,122,86,0.25);}
  .fkey-btn.lock-wrong{border-color:var(--wrong-red); background:rgba(179,58,58,0.25);}

  .ledger-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .ledger-row label{width:96px; font-size:0.82rem; color:var(--ink-soft); flex-shrink:0;}
  .ledger-input, .answer-input{flex:1; border:1.5px solid rgba(22,33,58,0.2); border-radius:8px; padding:11px 13px; font-family:'Space Mono', monospace; font-size:0.95rem; color:var(--ink); outline:none;}
  .ledger-input:focus, .answer-input:focus{border-color:var(--navy);}
  .ledger-input:disabled, .answer-input:disabled{background:#EAEDF2;}
  .answer-row{display:flex; gap:10px; margin-bottom:8px;}
  .submit-btn{background:var(--correct-green); color:#fff; border:none; border-radius:8px; padding:0 18px; font-size:0.88rem; font-weight:600; cursor:pointer; font-family:inherit;}
  .submit-btn:disabled{background:#B7C2AE; cursor:not-allowed;}

  .feedback{display:none; border-radius:8px; padding:12px 14px; margin:8px 0 14px 0; font-size:0.86rem; line-height:1.65;}
  .feedback.show{display:block;}
  .feedback.correct{background:rgba(26,122,86,0.1); border:1px solid rgba(26,122,86,0.3);}
  .feedback.incorrect{background:rgba(179,58,58,0.08); border:1px solid rgba(179,58,58,0.3);}
  .feedback .head{font-weight:700; margin-bottom:5px;}
  .feedback.correct .head{color:var(--correct-green);} .feedback.incorrect .head{color:var(--wrong-red);}
  .feedback .row-fb{font-family:'Space Mono', monospace; font-size:0.8rem; color:var(--ink);}
  .feedback .sol-line{color:var(--ink-soft); margin-top:5px; font-family:'Noto Sans Bengali','Noto Sans Devanagari',sans-serif;}

  .next-row{margin-top:auto; display:flex; justify-content:flex-end;}
  .primary-btn{background:var(--navy); color:#fff; border:none; border-radius:24px; padding:11px 24px; font-size:0.88rem; font-weight:600; cursor:pointer; font-family:inherit;}
  .primary-btn:disabled{background:#AAB3C2; cursor:not-allowed;}
  .secondary-btn{background:none; border:1.5px solid rgba(22,33,58,0.2); color:var(--ink); border-radius:24px; padding:10px 20px; font-size:0.86rem; cursor:pointer; font-family:inherit;}

  .result-top{text-align:center; padding:8px 0 4px 0;}
  .result-score{font-family:'Space Mono', monospace; font-size:2.8rem; color:var(--ink); line-height:1;}
  .result-score span{font-size:1.2rem; color:var(--ink-soft);}
  .result-pct{font-family:'Space Mono', monospace; font-size:0.95rem; color:var(--correct-green); margin-top:4px;}
  .result-msg{font-family:'Noto Serif Bengali','Noto Sans Devanagari',serif; font-size:1rem; text-align:center; margin:12px 0 16px 0;}
  .review-toggle{font-size:0.82rem; color:var(--correct-green); text-align:center; margin-bottom:10px; cursor:pointer; text-decoration:underline;}
  .review-list{display:none; max-height:220px; overflow-y:auto; border:1px solid rgba(22,33,58,0.15); border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:0.8rem;}
  .review-list.show{display:block;}
  .review-item{padding:8px 0; border-bottom:1px solid rgba(22,33,58,0.1);}
  .review-item:last-child{border-bottom:none;}
  .review-item .ra{color:var(--wrong-red); font-family:'Space Mono', monospace;} .review-item .rc{color:var(--correct-green); font-family:'Space Mono', monospace;}
  .result-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:auto;}

  .tally-icon-wrap{display:flex; justify-content:center; margin:6px 0 16px 0;}
  .tally-icon{width:92px; height:92px; filter:drop-shadow(0 8px 18px rgba(20,40,80,0.4)); animation:tIconPop 0.55s cubic-bezier(.34,1.56,.64,1) both, tIconFloat 3.2s ease-in-out infinite 0.55s;}
  @keyframes tIconPop{from{opacity:0; transform:scale(0.55) rotate(8deg);} to{opacity:1; transform:scale(1) rotate(0deg);}}
  @keyframes tIconFloat{0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);}}
  .tbar-h, .tbar-v{fill:#D9A441; animation:goldPulse 2.6s ease-in-out infinite;}
  @keyframes goldPulse{0%,100%{fill:#D9A441;} 50%{fill:#F0C36B;}}
  .dot-left{opacity:0.4; animation:dotBlink 2.6s ease-in-out infinite 0.3s;}
  .dot-right{opacity:0.4; animation:dotBlink 2.6s ease-in-out infinite 1.3s;}
  @keyframes dotBlink{0%,100%{opacity:0.35;} 50%{opacity:1;}}
  .badge-bg, .badge-check{opacity:0; transform-box:fill-box; transform-origin:center; animation:badgePop 0.5s ease both; animation-delay:0.75s;}
  @keyframes badgePop{from{opacity:0; transform:scale(0.3);} to{opacity:1; transform:scale(1);}}
  @media (prefers-reduced-motion: reduce){ .tally-icon, .tbar-h, .tbar-v, .dot-left, .dot-right{animation:none !important;} }

  footer.brandfooter{text-align:center; padding:14px 20px 18px 20px; border-top:1px solid rgba(22,33,58,0.1); font-size:0.72rem; color:var(--ink-soft); line-height:1.6; background:#fff;}
  footer.brandfooter b{color:var(--ink-soft);}
</style>
</head>
<body>
<div class="sheet">
  <header class="topbar">
    <span class="brandmark">TALLY PRIME · ACCOUNTANCY MASTER</span>
    <div class="top-actions">
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn active" data-lang="bn">বাং</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="hi">हि</button>
      </div>
      <button class="icon-btn" id="homeBtn">⌂</button>
    </div>
  </header>
  <main>
    <section class="screen active" id="screen-lock">
      <div class="tally-icon-wrap">
        <svg viewBox="0 0 100 100" class="tally-icon" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="92" height="92" rx="18" fill="#142850"/>
          <rect class="tbar-h" x="22" y="30" width="56" height="6" rx="3"/>
          <rect class="tbar-v" x="47" y="30" width="6" height="46" rx="3"/>
          <circle class="dot-left" cx="34" cy="50" r="3" fill="#FFFFFF"/>
          <circle class="dot-right" cx="66" cy="50" r="3" fill="#FFFFFF"/>
          <circle class="badge-bg" cx="78" cy="78" r="14" fill="#1A7A56"/>
          <path class="badge-check" d="M71 78 L76 83 L86 71" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="hero-eyebrow" style="text-align:center;" id="lockEyebrow"></div>
      <h1 class="hero-title" style="text-align:center;" id="lockTitle"></h1>
      <p class="hero-sub" style="text-align:center;" id="lockSub"></p>
      <div class="answer-row">
        <input class="answer-input" id="lockInput" type="text" autocomplete="off" spellcheck="false">
        <button class="submit-btn" id="lockBtn"></button>
      </div>
      <div class="feedback incorrect" id="lockError"><div class="head" id="lockErrorText"></div></div>
    </section>

    <section class="screen" id="screen-start">
      <div class="hero-eyebrow" id="startEyebrow"></div>
      <h1 class="hero-title" id="startTitle"></h1>
      <p class="hero-sub" id="startSub"></p>
      <div class="option-label" id="kindLabel"></div>
      <div class="chip-row" id="kindChips">
        <button class="chip active" data-kind="mixed"></button>
        <button class="chip" data-kind="transaction"></button>
        <button class="chip" data-kind="theory"></button>
      </div>
      <div class="option-label" id="lenLabel"></div>
      <div class="chip-row" id="lenChips">
        <button class="chip" data-len="10"></button>
        <button class="chip active" data-len="25"></button>
        <button class="chip" data-len="50"></button>
        <button class="chip" data-len="100"></button>
        <button class="chip" data-len="all"></button>
      </div>
      <button class="start-btn" id="startBtn"></button>
    </section>

    <section class="screen" id="screen-quiz">
      <div class="ruler-wrap">
        <div class="ruler-meta"><span class="count" id="qCounter"></span><span class="score" id="scoreCounter"></span></div>
        <div class="ruler-track"><div class="ruler-ticks" id="rulerTicks"></div><div class="ruler-cursor" id="rulerCursor"></div></div>
      </div>
      <div id="qTagArea"></div>
      <p class="question-text" id="questionText"></p>

      <div id="transactionArea" style="display:none;">
        <div class="fkey-row" id="fkeyRow"></div>
        <div class="ledger-row"><label id="drLabel"></label><input class="ledger-input" id="drInput" type="text" autocomplete="off" spellcheck="false"></div>
        <div class="ledger-row"><label id="crLabel"></label><input class="ledger-input" id="crInput" type="text" autocomplete="off" spellcheck="false"></div>
        <div style="display:flex; justify-content:flex-end; margin-bottom:8px;"><button class="submit-btn" id="txSubmitBtn"></button></div>
      </div>

      <div id="theoryArea" style="display:none;">
        <div class="answer-row">
          <input class="answer-input" id="theoryInput" type="text" autocomplete="off" spellcheck="false">
          <button class="submit-btn" id="thSubmitBtn"></button>
        </div>
      </div>

      <div class="feedback" id="feedbackBox">
        <div class="head" id="feedbackHead"></div>
        <div id="feedbackDetail"></div>
        <div class="sol-line" id="feedbackSol"></div>
      </div>
      <div class="next-row"><button class="primary-btn" id="nextBtn" disabled></button></div>
    </section>

    <section class="screen" id="screen-result">
      <div class="result-top"><div class="result-score" id="resultScore">0<span>/25</span></div><div class="result-pct" id="resultPct">0%</div></div>
      <p class="result-msg" id="resultMsg"></p>
      <div class="review-toggle" id="reviewToggle"></div>
      <div class="review-list" id="reviewList"></div>
      <div class="result-actions">
        <button class="secondary-btn" id="retryBtn"></button>
        <button class="primary-btn" id="newSettingsBtn"></button>
      </div>
    </section>
  </main>
  <footer class="brandfooter">
    <b>স্মার্ট স্টাডি যুব কম্পিউটার এডুকেশন সেন্টার</b> &amp; <b>পারুলিয়া যুব কম্পিউটার প্রশিক্ষণ কেন্দ্র</b><br>নবদ্বীপ, নদীয়া<br><br>
    <a href="https://chatterjeekisorgopal-tech.github.io/MS-word-Quiz/portfolio.html" style="color:var(--correct-green); font-weight:700; text-decoration:none;">💼 আপনার প্রতিষ্ঠানের জন্য এমন ওয়েব অ্যাপ চান? এখানে ক্লিক করুন</a>
  </footer>
</div>

<script>
/* ===================== LANGUAGE STATE ===================== */
var currentLang = 'bn';
var bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
function toBnNum(n){ return String(n).replace(/[0-9]/g, function(d){ return bnDigits[+d]; }); }
function fmtNum(n){ return currentLang==='bn' ? toBnNum(n) : String(n); }
function rupee(n){ return '₹'+fmtNum(n); }
function amtBn(n){ return '₹'+toBnNum(n); }
function amtEn(n){ return '₹'+String(n); }
function t(key){ return UI[key] ? UI[key][currentLang] : key; }

/* ===================== UI STRING DICTIONARY ===================== */
var UI = {
  lockEyebrow:{bn:'প্রবেশ সুরক্ষিত', en:'Secure Access', hi:'सुरक्षित प्रवेश'},
  lockTitle:{bn:'পাসওয়ার্ড দিন', en:'Enter Password', hi:'पासवर्ड डालें'},
  lockSub:{bn:'এই অ্যাপে প্রবেশ করতে আপনার সেন্টারের দেওয়া পাসওয়ার্ডটি লিখুন।', en:'Enter the password given by your center to access this app.', hi:'इस ऐप में प्रवेश के लिए अपने सेंटर का पासवर्ड डालें।'},
  lockPlaceholder:{bn:'পাসওয়ার্ড লিখুন...', en:'Enter password...', hi:'पासवर्ड डालें...'},
  lockBtn:{bn:'প্রবেশ করুন', en:'Enter', hi:'प्रवेश करें'},
  lockErrorText:{bn:'❌ পাসওয়ার্ড ভুল হয়েছে, আবার চেষ্টা করুন।', en:'❌ Wrong password, please try again.', hi:'❌ पासवर्ड गलत है, फिर कोशिश करें।'},

  startEyebrow:{bn:'৪০০+ এক্সারসাইজ · ভাউচার এন্ট্রি + থিওরি', en:'400+ Exercises · Voucher Entry + Theory', hi:'400+ अभ्यास · वाउचर एंट्री + थ्योरी'},
  startTitle:{bn:'Tally Prime ও একাউন্টান্সি মাস্টার', en:'Tally Prime & Accountancy Master', hi:'Tally Prime और अकाउंटेंसी मास्टर'},
  startSub:{bn:'আসল Tally-র মতো F-key চেপে ভাউচার বেছে নিন, তারপর Dr ও Cr লেজার টাইপ করুন। সাথে Manual Accountancy-র থিওরি ও শর্টকাট প্রশ্নও থাকছে।',
            en:'Choose the voucher by pressing F-keys just like real Tally, then type the Dr and Cr ledgers. Manual Accountancy theory and shortcut questions are included too.',
            hi:'असली Tally की तरह F-key दबाकर वाउचर चुनें, फिर Dr और Cr लेजर टाइप करें। साथ में Manual Accountancy की थ्योरी और शॉर्टकट प्रश्न भी हैं।'},
  kindLabel:{bn:'কী ধরনের প্রশ্ন চান?', en:'What type of questions do you want?', hi:'आपको किस प्रकार के प्रश्न चाहिए?'},
  kindMixed:{bn:'মিশ্রিত (দুটোই)', en:'Mixed (Both)', hi:'मिश्रित (दोनों)'},
  kindTransaction:{bn:'শুধু ভাউচার এন্ট্রি', en:'Only Voucher Entry', hi:'केवल वाउचर एंट्री'},
  kindTheory:{bn:'শুধু থিওরি ও শর্টকাট', en:'Only Theory & Shortcuts', hi:'केवल थ्योरी और शॉर्टकट'},
  lenLabel:{bn:'কতগুলো প্রশ্ন চান?', en:'How many questions do you want?', hi:'आपको कितने प्रश्न चाहिए?'},
  len10:{bn:'১০', en:'10', hi:'10'}, len25:{bn:'২৫', en:'25', hi:'25'}, len50:{bn:'৫০', en:'50', hi:'50'}, len100:{bn:'১০০', en:'100', hi:'100'},
  lenAll:{bn:'সব (৪০০+)', en:'All (400+)', hi:'सभी (400+)'},
  startBtn:{bn:'শুরু করুন', en:'Start', hi:'शुरू करें'},

  qTagTx:{bn:'ভাউচার এন্ট্রি', en:'Voucher Entry', hi:'वाउचर एंट्री'},
  qTagTh:{bn:'থিওরি / শর্টকাট', en:'Theory / Shortcut', hi:'थ्योरी / शॉर्टकट'},

function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function viaPick(){
  var type = Math.random()<0.5 ? 'cash':'bank';
  return { ledger: type==='cash'?'CASH':'BANK',
    bn: type==='cash'?'নগদে':'ব্যাংকের মাধ্যমে',
    en: type==='cash'?'in cash':'via bank',
    hi: type==='cash'?'नगद में':'बैंक के माध्यम से' };
}
function ledgerWord(code){ return code==='CASH' ? 'Cash' : 'Bank'; }

/* ===================== ANSWER CHECKING ===================== */
function normLedger(s){ return String(s).trim().toUpperCase().replace(/A\/C\.?/g,'').replace(/ACCOUNT/g,'').replace(/[.\-]/g,'').replace(/\s+/g,''); }
function normText(s){ return String(s).trim().toUpperCase().replace(/\s+/g,''); }
function checkTheory(item, userInput){
  if(item.type === 'number'){
    var val = parseFloat(String(userInput).replace(/,/g,'').trim());
    if(isNaN(val)) return false;
    return Math.abs(val - item.correctNumber) <= Math.max(item.tol||0, 0.01);
  }
  var norm = normText(userInput);
  return item.ans.some(function(a){ return normText(a)===norm; });
}
function correctTheoryDisplay(item){ return item.type==='number' ? fmtNum(item.correctNumber) : item.ans[0]; }

var soundOn = true;
var audioCtx = null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; } } return audioCtx; }
function playTone(freq, duration, type, delay, gainVal){
  if(!soundOn) return; var ctx=ensureAudio(); if(!ctx) return;
  var osc=ctx.createOscillator(), gain=ctx.createGain();
  osc.type=type; osc.frequency.value=freq; osc.connect(gain); gain.connect(ctx.destination);
  var st=ctx.currentTime+delay;
  gain.gain.setValueAtTime(0.0001, st); gain.gain.linearRampToValueAtTime(gainVal, st+0.01); gain.gain.exponentialRampToValueAtTime(0.001, st+duration);
  osc.start(st); osc.stop(st+duration+0.03);
}
function playCorrectSound(){ playTone(880,0.12,'sine',0,0.16); playTone(1320,0.16,'sine',0.1,0.16); }
function playWrongSound(){ playTone(220,0.18,'sawtooth',0,0.13); playTone(160,0.22,'sawtooth',0.12,0.13); }

/* ===================== APP STATE ===================== */
var state = { pool:[], idx:0, score:0, results:[], sessionLen:25, kindFilter:'mixed', selectedVoucher:null, started:false };
var screens = { lock:document.getElementById('screen-lock'), start:document.getElementById('screen-start'), quiz:document.getElementById('screen-quiz'), result:document.getElementById('screen-result') };
function showScreen(name){
  Object.keys(screens).forEach(function(k){ screens[k].classList.remove('active'); });
  screens[name].classList.add('active');
  document.getElementById('homeBtn').classList.toggle('show', name!=='start' && name!=='lock');
}
function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=randInt(0,i); var tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }

/* ===================== APPLY LANGUAGE (updates all static text) ===================== */
function applyLanguage(){
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.lang===currentLang); });

  document.getElementById('lockEyebrow').textContent = t('lockEyebrow');
  document.getElementById('lockTitle').textContent = t('lockTitle');
  document.getElementById('lockSub').textContent = t('lockSub');
  document.getElementById('lockInput').placeholder = t('lockPlaceholder');
  document.getElementById('lockBtn').textContent = t('lockBtn');
  document.getElementById('lockErrorText').textContent = t('lockErrorText');

  document.getElementById('startEyebrow').textContent = t('startEyebrow');
  document.getElementById('startTitle').textContent = t('startTitle');
  document.getElementById('startSub').textContent = t('startSub');
  document.getElementById('kindLabel').textContent = t('kindLabel');
  document.querySelector('[data-kind="mixed"]').textContent = t('kindMixed');
  document.querySelector('[data-kind="transaction"]').textContent = t('kindTransaction');
  document.querySelector('[data-kind="theory"]').textContent = t('kindTheory');
  document.getElementById('lenLabel').textContent = t('lenLabel');
  document.querySelector('[data-len="10"]').textContent = t('len10');
  document.querySelector('[data-len="25"]').textContent = t('len25');
  document.querySelector('[data-len="50"]').textContent = t('len50');
  document.querySelector('[data-len="100"]').textContent = t('len100');
  document.querySelector('[data-len="all"]').textContent = t('lenAll');
  document.getElementById('startBtn').textContent = t('startBtn');

  document.getElementById('drLabel').textContent = t('drLabel');
  document.getElementById('crLabel').textContent = t('crLabel');
  document.getElementById('drInput').placeholder = t('ledgerPlaceholder');
  document.getElementById('crInput').placeholder = t('ledgerPlaceholder');
  document.getElementById('txSubmitBtn').textContent = t('txSubmit');
  document.getElementById('theoryInput').placeholder = t('answerPlaceholder');
  document.getElementById('thSubmitBtn').textContent = t('thSubmit');

  document.getElementById('retryBtn').textContent = t('retryBtn');
  document.getElementById('newSettingsBtn').textContent = t('newSettingsBtn');

  if(screens.quiz.classList.contains('active') && state.pool.length){ renderQuestion(); }
  if(screens.result.classList.contains('active')){ refreshResultDisplay(); }
}

document.querySelectorAll('.lang-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ currentLang = btn.dataset.lang; applyLanguage(); });
});

document.querySelectorAll('#kindChips .chip').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('#kindChips .chip').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active'); state.kindFilter = btn.dataset.kind;
  });
});
document.querySelectorAll('#lenChips .chip').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('#lenChips .chip').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active'); state.sessionLen = btn.dataset.len;
  });
});

document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('homeBtn').addEventListener('click', goHome);
document.getElementById('newSettingsBtn').addEventListener('click', goHome);
document.getElementById('retryBtn').addEventListener('click', startQuiz);
function goHome(){ showScreen('start'); }

function getPoolForFilter(){
  if(state.kindFilter === 'transaction') return FULL_BANK_ALL.filter(function(q){return q.kind==='transaction';});
  if(state.kindFilter === 'theory') return FULL_BANK_ALL.filter(function(q){return q.kind==='theory';});
  return FULL_BANK_ALL;
}

function startQuiz(){
  var base = getPoolForFilter();
  var n = state.sessionLen === 'all' ? base.length : Math.min(parseInt(state.sessionLen,10), base.length);
  state.pool = shuffle(base).slice(0, n);
  state.idx=0; state.score=0; state.results=[];
  showScreen('quiz'); buildRuler(); renderQuestion();
}

function buildRuler(){
  var ticks=document.getElementById('rulerTicks'); ticks.innerHTML='';
  var total=state.pool.length;
  for(var i=0;i<total;i++){
    var tk=document.createElement('div'); tk.className='tick'; var nn=i+1;
    if(total<=15){ if(nn%5===0) tk.classList.add('medium'); } else { if(nn%25===0) tk.classList.add('major'); else if(nn%10===0) tk.classList.add('medium'); }
    ticks.appendChild(tk);
  }
  moveCursor();
}
function moveCursor(){ var total=state.pool.length; var pct= total<=1?0:(state.idx/(total-1))*100; document.getElementById('rulerCursor').style.left=pct+'%'; }

function buildFkeyRow(){
  var row=document.getElementById('fkeyRow'); row.innerHTML='';
  voucherOptions.forEach(function(v){
    var b=document.createElement('button'); b.className='fkey-btn'; b.dataset.label=v.label; b.type='button';
    b.innerHTML='<span class="k">'+v.code+'</span>'+v.label;
    b.addEventListener('click', function(){
      if(document.getElementById('drInput').disabled) return;
      document.querySelectorAll('.fkey-btn').forEach(function(x){x.classList.remove('active');});
      this.classList.add('active'); state.selectedVoucher=this.dataset.label;
    });
    row.appendChild(b);
  });
}
buildFkeyRow();

function renderQuestion(){
  var item = state.pool[state.idx];
  document.getElementById('qCounter').textContent = t('qCounterPrefix')+' '+fmtNum(state.idx+1)+' / '+fmtNum(state.pool.length);
  document.getElementById('scoreCounter').textContent = t('scoreLabel')+' '+fmtNum(state.score);
  document.getElementById('questionText').textContent = item.q[currentLang];
  document.getElementById('qTagArea').innerHTML = item.kind==='transaction'
    ? '<span class="q-tag tx">'+t('qTagTx')+'</span>' : '<span class="q-tag th">'+t('qTagTh')+'</span>';

  document.getElementById('feedbackBox').classList.remove('show','correct','incorrect');
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = (state.idx===state.pool.length-1) ? t('resultBtn') : t('nextBtn');
  moveCursor();

  if(item.kind === 'transaction'){
    document.getElementById('transactionArea').style.display='';
    document.getElementById('theoryArea').style.display='none';
    state.selectedVoucher=null;
    document.querySelectorAll('.fkey-btn').forEach(function(x){ x.classList.remove('active','lock-correct','lock-wrong'); x.disabled=false; });
    var dr=document.getElementById('drInput'), cr=document.getElementById('crInput');
    dr.value=''; cr.value=''; dr.disabled=false; cr.disabled=false;
    document.getElementById('txSubmitBtn').disabled=false;
    setTimeout(function(){ dr.focus(); }, 30);
  } else {
    document.getElementById('transactionArea').style.display='none';
    document.getElementById('theoryArea').style.display='';
    var ti=document.getElementById('theoryInput'); ti.value=''; ti.disabled=false;
    document.getElementById('thSubmitBtn').disabled=false;
    setTimeout(function(){ ti.focus(); }, 30);
  }
}

function lockTransactionUI(){
  document.getElementById('drInput').disabled=true;
  document.getElementById('crInput').disabled=true;
  document.getElementById('txSubmitBtn').disabled=true;
  document.querySelectorAll('.fkey-btn').forEach(function(x){ x.disabled=true; });
}

function submitTransaction(){
  var item = state.pool[state.idx];
  if(document.getElementById('drInput').disabled) return;
  if(!state.selectedVoucher){ document.querySelectorAll('.fkey-btn')[0].focus(); return; }
  var drVal = document.getElementById('drInput').value.trim();
  var crVal = document.getElementById('crInput').value.trim();
  if(drVal==='' || crVal===''){ return; }

  var voucherOK = state.selectedVoucher === item.voucher;
  var drOK = item.dr.some(function(a){ return normLedger(a)===normLedger(drVal); });
  var crOK = item.cr.some(function(a){ return normLedger(a)===normLedger(crVal); });
  var allOK = voucherOK && drOK && crOK;

  lockTransactionUI();
  document.querySelectorAll('.fkey-btn').forEach(function(x){
    if(x.dataset.label === item.voucher) x.classList.add('lock-correct');
    else if(x.classList.contains('active')) x.classList.add('lock-wrong');
  });

  var box=document.getElementById('feedbackBox');
  box.classList.add('show', allOK?'correct':'incorrect');
  document.getElementById('feedbackHead').textContent = allOK ? t('fbCorrectHead') : t('fbWrongHead');
  document.getElementById('feedbackDetail').innerHTML =
    '<div class="row-fb">'+t('fbVoucher')+' '+(voucherOK?'✅':'❌ '+t('fbCorrectShort')+' '+item.voucher)+'</div>'+
    '<div class="row-fb">Dr: '+(drOK?'✅':'❌ '+t('fbCorrectShort')+' '+item.dr[0])+'</div>'+
    '<div class="row-fb">Cr: '+(crOK?'✅':'❌ '+t('fbCorrectShort')+' '+item.cr[0])+'</div>';
  document.getElementById('feedbackSol').textContent = item.sol[currentLang] ? (t('fbSolPrefix')+' '+item.sol[currentLang]) : '';

  if(allOK){ state.score++; playCorrectSound(); } else { playWrongSound(); }
  state.results.push({kind:'transaction', q:item.q[currentLang],
    userSummary:t('fbVoucher')+(state.selectedVoucher||'—')+' Dr:'+drVal+' Cr:'+crVal,
    correctSummary:t('fbVoucher')+item.voucher+' Dr:'+item.dr[0]+' Cr:'+item.cr[0], correct:allOK});

  var tickEl = document.querySelectorAll('#rulerTicks .tick')[state.idx];
  if(tickEl) tickEl.classList.add(allOK?'correct':'incorrect');
  document.getElementById('scoreCounter').textContent=t('scoreLabel')+' '+fmtNum(state.score);
  document.getElementById('nextBtn').disabled=false;
}

function submitTheory(){
  var item = state.pool[state.idx];
  var input=document.getElementById('theoryInput');
  if(input.disabled) return;
  var val=input.value.trim(); if(val==='') return;
  var isCorrect = checkTheory(item, val);
  input.disabled=true; document.getElementById('thSubmitBtn').disabled=true;

  var box=document.getElementById('feedbackBox');
  box.classList.add('show', isCorrect?'correct':'incorrect');
  document.getElementById('feedbackHead').textContent = isCorrect ? t('fbCorrectHeadTh') : t('fbWrongHeadTh');
  document.getElementById('feedbackDetail').innerHTML = '<div class="row-fb">'+t('fbCorrectAnsPrefix')+' '+correctTheoryDisplay(item)+'</div>';
  document.getElementById('feedbackSol').textContent = item.sol[currentLang] ? (t('fbSolPrefix')+' '+item.sol[currentLang]) : '';

  if(isCorrect){ state.score++; playCorrectSound(); } else { playWrongSound(); }
  state.results.push({kind:'theory', q:item.q[currentLang], userSummary:val, correctSummary:correctTheoryDisplay(item), correct:isCorrect});

  var tickEl = document.querySelectorAll('#rulerTicks .tick')[state.idx];
  if(tickEl) tickEl.classList.add(isCorrect?'correct':'incorrect');
  document.getElementById('scoreCounter').textContent=t('scoreLabel')+' '+fmtNum(state.score);
  document.getElementById('nextBtn').disabled=false;
}

document.getElementById('txSubmitBtn').addEventListener('click', submitTransaction);
document.getElementById('thSubmitBtn').addEventListener('click', submitTheory);
document.getElementById('drInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); document.getElementById('crInput').focus(); } });
document.getElementById('crInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); submitTransaction(); } });
document.getElementById('theoryInput').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ e.preventDefault();
    if(!document.getElementById('theoryInput').disabled) submitTheory(); else document.getElementById('nextBtn').click();
  }
});
document.getElementById('nextBtn').addEventListener('click', function(){
  if(state.idx < state.pool.length-1){ state.idx++; renderQuestion(); } else { showResult(); }
});

var lastResultData = null;
function showResult(){
  var total=state.pool.length;
  var pct=Math.round((state.score/total)*100);
  lastResultData = { score:state.score, total:total, pct:pct, results:state.results.slice() };
  showScreen('result');
  refreshResultDisplay();
}
function refreshResultDisplay(){
  if(!lastResultData) return;
  document.getElementById('resultScore').innerHTML = fmtNum(lastResultData.score)+'<span>/'+fmtNum(lastResultData.total)+'</span>';
  document.getElementById('resultPct').textContent = fmtNum(lastResultData.pct)+'%';
  var msg = lastResultData.pct>=80 ? t('resultMsgHigh') : (lastResultData.pct>=50 ? t('resultMsgMid') : t('resultMsgLow'));
  document.getElementById('resultMsg').textContent = msg;

  var missed = lastResultData.results.filter(function(r){return !r.correct;});
  var reviewList=document.getElementById('reviewList'), reviewToggle=document.getElementById('reviewToggle');
  if(missed.length===0){ reviewToggle.textContent=t('reviewAllCorrect'); reviewList.innerHTML=''; }
  else {
    reviewToggle.textContent=t('reviewMissedPrefix')+' '+fmtNum(missed.length)+' '+t('reviewMissedSuffix');
    reviewList.innerHTML = missed.map(function(r){
      return '<div class="review-item"><div>'+r.q+'</div><div>'+t('reviewYour')+' <span class="ra">'+r.userSummary+'</span></div><div>'+t('reviewCorrect')+' <span class="rc">'+r.correctSummary+'</span></div></div>';
    }).join('');
  }
  reviewList.classList.remove('show');
}
document.getElementById('reviewToggle').addEventListener('click', function(){ document.getElementById('reviewList').classList.toggle('show'); });

/* ===================== PASSWORD GATE ===================== */
var SITE_PASSWORD = 'CzuMT#4885';
function normPass(s){ return String(s).trim(); }
function tryUnlock(){
  var val = document.getElementById('lockInput').value;
  if(normPass(val) === normPass(SITE_PASSWORD)){
    document.getElementById('lockError').classList.remove('show');
    showScreen('start');
  } else {
    document.getElementById('lockError').classList.add('show');
    document.getElementById('lockInput').focus();
  }
}
document.getElementById('lockBtn').addEventListener('click', tryUnlock);
document.getElementById('lockInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); tryUnlock(); } });

applyLanguage();
document.getElementById('lockInput').focus();
</script>
